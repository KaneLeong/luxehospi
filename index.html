<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" href="/logo-icon.webp" />
    <link rel="icon" type="image/png" href="/logo-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/logo-icon-white.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    {/* Primary Meta (fallback, each page overrides via Helmet) */}
    <meta name="description" content="LUXEHOSPI - Vertically integrated hotel supplies manufacturer from yarn to room. Bedding, towels, bathrobes, amenities — OEM/ODM for 50+ countries." />
    <meta name="theme-color" content="#1B3A5C" />

    {/* Open Graph Fallback */}
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="LUXEHOSPI" />
    <meta property="og:locale" content="en_US" />

    {/* Twitter Card Fallback */}
    <meta name="twitter:card" content="summary_large_image" />

    {/* Self-hosted fonts — no external dependency */}
    <link rel="preload" href="/fonts/inter-400.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/inter-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/montserrat-600.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="stylesheet" href="/fonts/fonts.css" />

    {/* Critical CSS — inlined to eliminate render-blocking CSS fetch (~0.5KB) */}
    <style>*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}body{font-family:'Inter','Segoe UI',Arial,sans-serif;font-size:16px;line-height:1.6;color:#2C3E50;background:#fff}a{text-decoration:none;color:inherit}img{max-width:100%;display:block}#root{min-height:100vh}</style>

    <title>LUXEHOSPI - Hotel Supplies Manufacturer</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
